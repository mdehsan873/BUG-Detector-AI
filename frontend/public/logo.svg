<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a5b4fc"/>
      <stop offset="100%" style="stop-color:#ffffff"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Bug body (circle) -->
  <circle cx="220" cy="280" r="90" fill="none" stroke="url(#arrow)" stroke-width="28" stroke-linecap="round"/>
  <!-- Bug antennae -->
  <line x1="185" y1="200" x2="165" y2="155" stroke="url(#arrow)" stroke-width="22" stroke-linecap="round"/>
  <line x1="255" y1="200" x2="275" y2="155" stroke="url(#arrow)" stroke-width="22" stroke-linecap="round"/>
  <!-- Bug legs left -->
  <line x1="138" y1="250" x2="105" y2="230" stroke="url(#arrow)" stroke-width="18" stroke-linecap="round"/>
  <line x1="133" y1="290" x2="95" y2="295" stroke="url(#arrow)" stroke-width="18" stroke-linecap="round"/>
  <line x1="145" y1="330" x2="110" y2="358" stroke="url(#arrow)" stroke-width="18" stroke-linecap="round"/>
  <!-- Bug legs right -->
  <line x1="302" y1="250" x2="335" y2="230" stroke="url(#arrow)" stroke-width="18" stroke-linecap="round"/>
  <line x1="307" y1="290" x2="345" y2="295" stroke="url(#arrow)" stroke-width="18" stroke-linecap="round"/>
  <line x1="295" y1="330" x2="330" y2="358" stroke="url(#arrow)" stroke-width="18" stroke-linecap="round"/>
  <!-- Upward arrow (lyft) -->
  <polygon points="380,120 420,185 400,185 400,340 360,340 360,185 340,185" fill="url(#arrow)" opacity="0.95"/>
  <!-- Small search magnifier accent inside bug -->
  <circle cx="205" cy="270" r="22" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="10"/>
  <line x1="220" y1="285" x2="240" y2="305" stroke="rgba(255,255,255,0.5)" stroke-width="10" stroke-linecap="round"/>
</svg>
